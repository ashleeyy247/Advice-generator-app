<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css" />
  <title>Frontend Mentor | Advice generator app</title>

</head>

<body>
  <div class="container">
    <div class="advice-id">
      ADVICE #<span id="advice-id"> </span>
    </div>
    <div class="advice-text">
      <q><span id="advice-text"> </span></q>
    </div>
    <div class="img-divider">
      <img class="divider-mobile" src="./images/pattern-divider-mobile.svg" alt="pattern-divider-mobile">
      <img class="divider-desktop" src="./images/pattern-divider-desktop.svg" alt="pattern-divider-desktop">
    </div>
    <div class="button-div">
      <button class="dice-button" id="dice-button">
        <img src="./images/icon-dice.svg">
      </button>
    </div>

  </div>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
    Coded by <a href="#">ashleeyy_247</a>.
  </footer>

  <script>
    const diceBtn = document.getElementById('dice-button');
    const adviceTextEl = document.getElementById('advice-text');
    const adviceIdEl = document.getElementById('advice-id')

    fetchAdvice()
    diceBtn.addEventListener("click", function () {
      fetchAdvice()
    })

    async function fetchAdvice() {
      try {
        const response = await fetch('https://api.adviceslip.com/advice')

        if (!response.ok) {
          return
        }
        const data = await response.json();
        const id = data.slip.id
        const advice = data.slip.advice

        adviceTextEl.innerText = advice;
        adviceIdEl.innerText = id
      }
      catch (error) {
        adviceTextEl.innerText = "Unable to fetch advice";
      }
    }
  </script>
</body>

</html>
